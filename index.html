<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eruo AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Figtree', sans-serif;
            background-color: #fcfcfc;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }

        /* Hide default focus ring */
        textarea:focus {
            outline: none;
        }
    </style>
</head>
<body class="text-slate-900 overflow-hidden">

    <div id="app" class="flex h-screen w-full relative">
        
        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/5 backdrop-blur-[2px] z-40 hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-white border-r border-slate-100 z-50 transform -translate-x-full sidebar-transition">
            <div class="p-5 flex flex-col h-full">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2 font-bold text-xl text-black">
                        <div class="w-8 h-8 bg-black rounded-full shadow-lg shadow-black/10"></div>
                        Eruo
                    </div>
                    <button id="close-sidebar" class="p-2 hover:bg-slate-50 rounded-full transition-colors text-slate-400">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                
                <button id="new-chat-btn" class="flex items-center gap-3 w-full p-3.5 mb-6 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-black hover:text-white transition-all text-slate-600 font-semibold shadow-sm">
                    <i data-lucide="plus"></i>
                    Đoạn chat mới
                </button>

                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.15em] mb-4 px-2">Gần đây</h3>
                    <div class="space-y-1">
                        <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 cursor-pointer text-slate-500 group transition-colors">
                            <i data-lucide="history" class="text-slate-300 group-hover:text-black"></i>
                            <span class="text-sm font-medium truncate">Lịch sử phân tích</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Container -->
        <main class="flex-1 flex flex-col items-center relative w-full h-full">
            
            <!-- Header -->
            <header class="w-full p-4 flex items-center justify-between absolute top-0 z-30">
                <div class="flex items-center gap-1">
                    <button id="open-sidebar" class="p-3 hover:bg-white hover:shadow-sm rounded-2xl transition-all text-slate-400 hover:text-black">
                        <i data-lucide="menu"></i>
                    </button>
                    <button id="reset-chat" class="p-3 hover:bg-white hover:shadow-sm rounded-2xl transition-all text-slate-400 hover:text-black">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="chat-container" class="w-full max-w-4xl flex-1 flex flex-col transition-all duration-700 justify-center items-center">
                
                <!-- Hero Section -->
                <div id="hero-section" class="flex flex-col items-center text-center animate-fade-in px-6 w-full">
                    <h1 class="text-2xl md:text-4xl font-semibold text-slate-900 mb-6 tracking-tight leading-tight">
                        Xin chào! Hôm nay bạn muốn chúng ta <br /> 
                        <span class="text-black underline decoration-slate-200 underline-offset-8">học gì cùng nhau?</span>
                    </h1>
                    <p class="text-slate-400 max-w-lg leading-relaxed text-base font-normal">
                        Eruo đã sẵn sàng xử lý hình ảnh và dữ liệu phức tạp để đồng hành cùng bạn.
                    </p>
                </div>

                <!-- Messages Area -->
                <div id="messages-list" class="hidden w-full flex-1 overflow-y-scroll px-4 md:px-20 space-y-6 pb-48 pt-20 custom-scrollbar">
                    <!-- Messages content -->
                </div>

                <!-- Input Area -->
                <div class="w-full max-w-3xl mx-auto px-6 absolute bottom-8 z-20">
                    <div class="relative group">
                        <div class="absolute inset-0 bg-black/5 blur-3xl rounded-[2.5rem] opacity-0 focus-within:opacity-100 transition-opacity"></div>
                        
                        <div class="relative bg-white border border-slate-100 shadow-[0_20px_50px_-20px_rgba(0,0,0,0.12)] rounded-[2rem] transition-all duration-300 focus-within:shadow-[0_20px_50px_-12px_rgba(0,0,0,0.15)] focus-within:border-black/20 p-2">
                            
                            <!-- Image Preview -->
                            <div id="image-preview-container" class="hidden px-4 pt-2 flex animate-fade-in">
                                <div class="relative">
                                    <img id="image-preview" src="" class="h-16 w-16 object-cover rounded-xl border border-slate-100">
                                    <button id="remove-image" class="absolute -top-2 -right-2 bg-black text-white rounded-full p-1 shadow-md hover:scale-110 transition-transform">
                                        <i data-lucide="x" style="width: 12px; height: 12px;"></i>
                                    </button>
                                </div>
                            </div>

                            <textarea
                                id="chat-input"
                                placeholder="Hỏi bất cứ điều gì, hoặc gửi ảnh cho Eruo..."
                                class="w-full bg-transparent border-none focus:ring-0 text-slate-800 py-2 px-4 resize-none min-h-[40px] max-h-48 text-base font-medium placeholder:text-slate-300 leading-relaxed"
                                rows="1"
                            ></textarea>
                            
                            <div class="flex items-center justify-between px-1 pb-1">
                                <div class="flex items-center">
                                    <input type="file" id="file-input" accept="image/*" class="hidden">
                                    <button id="upload-btn" class="p-2 text-slate-300 hover:text-black hover:bg-slate-50 rounded-xl transition-all" title="Tải ảnh lên">
                                        <i data-lucide="image" style="width: 20px; height: 20px;"></i>
                                    </button>
                                </div>
                                
                                <button 
                                    id="send-btn"
                                    disabled
                                    class="flex items-center justify-center p-2.5 rounded-full transition-all bg-slate-50 text-slate-200 cursor-not-allowed"
                                    title="Gửi câu hỏi"
                                >
                                    <i data-lucide="arrow-up" style="width: 22px; height: 22px; stroke-width: 3px;"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Help Button -->
            <button class="fixed bottom-8 right-8 p-3.5 bg-white text-slate-300 hover:text-black hover:shadow-md rounded-2xl shadow-sm border border-slate-50 transition-all" title="Trợ giúp">
                <i data-lucide="help-circle"></i>
            </button>

            <!-- Footer -->
            <footer id="main-footer" class="w-full p-8 text-center absolute bottom-0">
                <div class="flex items-center justify-center gap-6 text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">
                    <a href="#" class="hover:text-black transition-colors">Điều khoản</a>
                    <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                    <a href="#" class="hover:text-black transition-colors">Bảo mật</a>
                    <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                    <a href="#" class="hover:text-black transition-colors">Trợ giúp</a>
                </div>
            </footer>
        </main>
    </div>

    <script>
        // Mushuq API nisqa
        const apiKey = "AIzaSyBl1sL1xpBBD1Zb26R4fK3P7MwqDkhl5tI"; 
        const MODEL_NAME = 'gemini-2.5-flash-preview-09-2025';

        // Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const chatContainer = document.getElementById('chat-container');
        const heroSection = document.getElementById('hero-section');
        const messagesList = document.getElementById('messages-list');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image');
        const footer = document.getElementById('main-footer');

        let selectedImageBase64 = null;
        let isChatting = false;

        // Init Lucide
        lucide.createIcons();

        const toggleSidebar = (show) => {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            }
        };

        const updateSendBtnState = () => {
            const hasContent = chatInput.value.trim() !== '' || selectedImageBase64 !== null;
            if (hasContent) {
                sendBtn.disabled = false;
                sendBtn.classList.remove('bg-slate-50', 'text-slate-200', 'cursor-not-allowed');
                sendBtn.classList.add('bg-black', 'text-white', 'shadow-lg', 'shadow-black/20', 'hover:scale-105', 'active:scale-95');
            } else {
                sendBtn.disabled = true;
                sendBtn.classList.add('bg-slate-50', 'text-slate-200', 'cursor-not-allowed');
                sendBtn.classList.remove('bg-black', 'text-white', 'shadow-lg', 'shadow-black/20', 'hover:scale-105', 'active:scale-95');
            }
        };

        const createMessageElement = (role, text, image = null) => {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in w-full mb-6 px-4 md:px-20`;
            
            let html = `<div class="max-w-[80%] flex flex-col gap-2.5 ${role === 'user' ? 'items-end' : 'items-start'}">`;
            if (image) html += `<img src="${image}" class="max-w-[240px] rounded-2xl border border-slate-100 shadow-sm" />`;
            html += `
                <div class="py-3 px-5 rounded-[1.8rem] ${role === 'user' ? 'bg-black text-white rounded-tr-none shadow-md shadow-black/5' : 'bg-white text-slate-800 rounded-tl-none border border-slate-100 shadow-sm'}">
                    <div class="whitespace-pre-wrap text-[15px] leading-[1.6] font-medium">${text}</div>
                </div>
            </div>`;
            wrapper.innerHTML = html;
            return wrapper;
        };

        const addLoadingIndicator = () => {
            const loader = document.createElement('div');
            loader.id = 'ai-loader';
            loader.className = 'flex justify-start animate-pulse w-full mb-6 px-4 md:px-20';
            loader.innerHTML = `
                <div class="bg-white border border-slate-100 py-3 px-5 rounded-[1.8rem] rounded-tl-none shadow-sm flex items-center gap-3">
                    <div class="animate-spin text-slate-400" style="width: 16px; height: 16px;"><i data-lucide="loader-2"></i></div>
                    <span class="text-sm font-medium text-slate-400">Eruo đang suy nghĩ...</span>
                </div>
            `;
            messagesList.appendChild(loader);
            lucide.createIcons();
            messagesList.scrollTop = messagesList.scrollHeight;
        };

        document.getElementById('open-sidebar').onclick = () => toggleSidebar(true);
        document.getElementById('close-sidebar').onclick = () => toggleSidebar(false);
        sidebarOverlay.onclick = () => toggleSidebar(false);
        uploadBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    selectedImageBase64 = reader.result.split(',')[1];
                    imagePreview.src = reader.result;
                    imagePreviewContainer.classList.remove('hidden');
                    updateSendBtnState();
                };
                reader.readAsDataURL(file);
            }
        };

        removeImageBtn.onclick = () => {
            selectedImageBase64 = null;
            imagePreviewContainer.classList.add('hidden');
            fileInput.value = '';
            updateSendBtnState();
        };

        chatInput.oninput = () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = (chatInput.scrollHeight) + 'px';
            updateSendBtnState();
        };

        const startChatMode = () => {
            isChatting = true;
            heroSection.classList.add('hidden');
            footer.classList.add('hidden');
            messagesList.classList.remove('hidden');
            chatContainer.classList.remove('justify-center');
        };

        const resetChat = () => {
            isChatting = false;
            messagesList.innerHTML = '';
            messagesList.classList.add('hidden');
            heroSection.classList.remove('hidden');
            footer.classList.remove('hidden');
            chatContainer.classList.add('justify-center');
            chatInput.value = '';
            chatInput.style.height = 'auto';
            selectedImageBase64 = null;
            imagePreviewContainer.classList.add('hidden');
            updateSendBtnState();
        };

        document.getElementById('reset-chat').onclick = resetChat;
        document.getElementById('new-chat-btn').onclick = () => { resetChat(); toggleSidebar(false); };

        const handleSend = async () => {
            const text = chatInput.value.trim();
            const image = imagePreview.src;
            const currentImageBase64 = selectedImageBase64;

            if (!text && !currentImageBase64) return;
            if (!isChatting) startChatMode();

            messagesList.appendChild(createMessageElement('user', text || "Hãy phân tích hình ảnh này giúp tôi.", currentImageBase64 ? image : null));
            
            chatInput.value = '';
            chatInput.style.height = 'auto';
            selectedImageBase64 = null;
            imagePreviewContainer.classList.add('hidden');
            updateSendBtnState();
            addLoadingIndicator();

            try {
                const parts = [{ text: text || "Hãy phân tích hình ảnh này giúp tôi." }];
                if (currentImageBase64) parts.push({ inlineData: { mimeType: "image/png", data: currentImageBase64 } });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts }],
                        systemInstruction: { parts: [{ text: "Bạn tên là Eruo, một trợ lý AI thông minh. Hãy trả lời lịch lãm, sâu sắc và chuyên nghiệp." }] }
                    })
                });

                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Eruo gặp lỗi xử lý.";
                
                const loader = document.getElementById('ai-loader');
                if (loader) loader.remove();
                
                messagesList.appendChild(createMessageElement('ai', aiText));
                messagesList.scrollTop = messagesList.scrollHeight;
            } catch (error) {
                const loader = document.getElementById('ai-loader');
                if (loader) loader.remove();
                messagesList.appendChild(createMessageElement('ai', "Lỗi kết nối. Vui lòng thử lại."));
            }
        };

        sendBtn.onclick = handleSend;
        chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

    </script>
</body>
</html>
